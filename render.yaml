databases:
  - name: sofa-king-db
    databaseName: sofaking
    user: sofaking
    plan: free

services:
  - type: web
    name: sofa-king
    env: node
    plan: free
    region: oregon
    buildCommand: bash render-build.sh
    startCommand: node --enable-source-maps artifacts/api-server/dist/index.mjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: sofa-king-db
          property: connectionString
      - key: PORT
        value: 10000
      - key: SESSION_SECRET
        generateValue: true
      - key: ADMIN_EMAILS
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
      - key: VITE_CLERK_PUBLISHABLE_KEY
        sync: false
