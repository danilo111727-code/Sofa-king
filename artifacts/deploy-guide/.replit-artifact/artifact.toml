kind = "web"
previewPath = "/"
title = "Guia de Deploy"
version = "1.0.0"
id = "artifacts/deploy-guide"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20416

[services.development]
run = "pnpm --filter @workspace/deploy-guide run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/deploy-guide", "run", "build" ]
publicDir = "artifacts/deploy-guide/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20416"
BASE_PATH = "/"
